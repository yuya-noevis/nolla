<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warp Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
.screen { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
#warp-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
canvas { width: 100%; height: 100%; }
.btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; padding: 30px 60px; font-size: 24px; background: #4A7BA7; color: #fff; border: none; border-radius: 16px; cursor: pointer; }
.status { position: fixed; bottom: 10px; left: 10px; color: #0f0; font-family: monospace; font-size: 12px; z-index: 999; }
</style>
</head>
<body>
<div class="screen">
  <div id="warp-overlay">
    <canvas id="warp-canvas" width="1194" height="834"></canvas>
  </div>
  <button class="btn" id="startBtn" onclick="launchWarp()">Start Warp</button>
</div>
<div class="status" id="status">Ready</div>

<script>
function log(msg) {
  document.getElementById('status').textContent = msg;
  console.log(msg);
}

function launchWarp() {
  document.getElementById('startBtn').style.display = 'none';
  const overlay = document.getElementById('warp-overlay');
  const canvas = document.getElementById('warp-canvas');
  const ctx = canvas.getContext('2d');
  overlay.style.opacity = '1';

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      angle: Math.random() * Math.PI * 2,
      dist: Math.random() * 5,
      speed: 2 + Math.random() * 6,
      size: 0.5 + Math.random() * 1.5,
      bright: 0.5 + Math.random() * 0.5,
    });
  }

  let frame = 0;
  const totalFrames = 70;
  let navigated = false;

  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const speedFrame = Math.min(frame, 70);

    for (const s of stars) {
      s.dist += s.speed * (1 + speedFrame / 20);
      const x = cx + Math.cos(s.angle) * s.dist;
      const y = cy + Math.sin(s.angle) * s.dist;

      if (x < -10 || x > canvas.width + 10 || y < -10 || y > canvas.height + 10) {
        s.dist = Math.random() * 3;
        continue;
      }

      const tailLen = Math.min(s.dist * 0.3, 40);
      const tx = x - Math.cos(s.angle) * tailLen;
      const ty = y - Math.sin(s.angle) * tailLen;

      const grad = ctx.createLinearGradient(tx, ty, x, y);
      grad.addColorStop(0, 'transparent');
      grad.addColorStop(1, 'rgba(255, 255, 255, ' + s.bright + ')');

      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(x, y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = s.size;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x, y, s.size * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, ' + s.bright + ')';
      ctx.fill();
    }

    frame++;
    log('Frame ' + frame + (navigated ? ' (nav fired)' : ''));

    if (frame === totalFrames && !navigated) {
      navigated = true;
      log('Frame 70: navigation fired! Animation continues...');
      // In real app: window.location.href = '/game/...'
      // For test: simulate 3 second server delay, then show success
      setTimeout(function() {
        document.body.innerHTML = '<div style="color:#0f0;font-size:32px;text-align:center;padding-top:40vh;">Warp OK! Navigation would complete here.<br><br><a href="/warp-test.html" style="color:#4A7BA7;">Test Again</a></div>';
      }, 3000);
    }

    // NEVER stop — keep animating until page is replaced
    requestAnimationFrame(draw);
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  requestAnimationFrame(draw);
}
</script>
</body>
</html>
