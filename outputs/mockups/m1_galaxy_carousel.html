<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nolla M1 - Galaxy Carousel</title>
<style>
  :root {
    --dot-active: #FFFFFF;
    --dot-inactive: rgba(255, 255, 255, 0.25);
    --ui-backdrop: rgba(0, 0, 0, 0.15);
    --star-gold: #FFD700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* Screen Frame - 16:9 Landscape */
  .screen {
    position: relative;
    width: 1194px;
    height: 834px;
    overflow: hidden;
    background: #000;
  }

  /* Full-screen background (planet + sky combined) */
  .planet-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 0.4s ease;
  }

  /* Arrow buttons — image-based */
  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 160px;
    height: 160px;
    cursor: pointer;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.75;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 10;
  }
  .arrow:hover {
    opacity: 1;
    transform: translateY(-50%) scale(1.1);
  }
  .arrow-left {
    left: 24px;
    background-image: url('arrow_left.png');
  }
  .arrow-right {
    right: 24px;
    background-image: url('arrow_right.png');
  }

  /* Pagination dots */
  .dots {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    align-items: center;
    padding: 8px 20px;
    background: var(--ui-backdrop);
    border-radius: 16px;
    z-index: 10;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--dot-inactive);
    transition: background 0.3s;
  }
  .dot.active {
    background: var(--dot-active);
  }

  /* Lock icon (top-right) */
  .lock {
    position: absolute;
    top: 20px;
    right: 24px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .lock svg {
    width: 24px;
    height: 24px;
    stroke: white;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    opacity: 0.35;
  }

  /* Star counter (top-left) */
  .stars {
    position: absolute;
    top: 20px;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--ui-backdrop);
    border-radius: 14px;
    z-index: 10;
  }
  .star-icon svg {
    width: 22px;
    height: 22px;
    fill: var(--star-gold);
    stroke: none;
    filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.5));
  }
  .star-dots {
    display: grid;
    grid-template-columns: repeat(4, 6px);
    grid-template-rows: repeat(3, 6px);
    gap: 3px;
  }
  .star-dot {
    width: 6px;
    height: 6px;
    background: var(--star-gold);
    border-radius: 50%;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="screen">

  <!-- Full background (planet + sky combined) -->
  <div class="planet-bg" id="planet-bg" onclick="launchGame()" style="cursor:pointer;"></div>

  <!-- Warp out overlay -->
  <div id="warp-out" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:200;pointer-events:none;opacity:0;">
    <canvas id="warp-canvas" width="1194" height="834" style="width:100%;height:100%;"></canvas>
  </div>

  <!-- Arrow buttons (image-based) -->
  <div class="arrow arrow-left" onclick="cyclePlanet(-1)"></div>
  <div class="arrow arrow-right" onclick="cyclePlanet(1)"></div>

  <!-- Pagination Dots -->
  <div class="dots" id="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- Lock Icon (top-right) -->
  <div class="lock">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <!-- Star Counter (top-left) -->
  <div class="stars">
    <div class="star-icon">
      <svg viewBox="0 0 24 24">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/>
      </svg>
    </div>
    <div class="star-dots">
      <div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div>
      <div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div>
      <div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div>
    </div>
  </div>

</div>

<script>
  const PLANETS = [
    'planet_memory_match.png',
    'planet_sorting.png',
    'planet_visual_search.png',
    'planet_corsi_block.png',
  ];

  let current = 0;
  const bg = document.getElementById('planet-bg');
  const dots = document.querySelectorAll('.dot');

  function showPlanet(index) {
    current = ((index % PLANETS.length) + PLANETS.length) % PLANETS.length;
    bg.style.backgroundImage = `url('${PLANETS[current]}')`;
    dots.forEach((d, i) => d.classList.toggle('active', i === current));
  }

  function cyclePlanet(dir) {
    showPlanet(current + dir);
  }

  showPlanet(0);

  const GAME_PAGES = [
    'm4_memory_match.html',
    'm4_sorting.html',
    'm4_visual_search.html',
    'm4_corsi_block.html',
  ];

  function launchGame() {
    const overlay = document.getElementById('warp-out');
    const canvas = document.getElementById('warp-canvas');
    const ctx = canvas.getContext('2d');
    overlay.style.opacity = '1';

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const stars = [];
    for (let i = 0; i < 200; i++) {
      const angle = Math.random() * Math.PI * 2;
      stars.push({
        angle,
        dist: Math.random() * 5,
        speed: 2 + Math.random() * 6,
        size: 0.5 + Math.random() * 1.5,
        bright: 0.5 + Math.random() * 0.5,
      });
    }

    let frame = 0;
    const totalFrames = 70; // ~1.2s at 60fps

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const s of stars) {
        s.dist += s.speed * (1 + frame / 20);
        const x = cx + Math.cos(s.angle) * s.dist;
        const y = cy + Math.sin(s.angle) * s.dist;

        if (x < -10 || x > canvas.width + 10 || y < -10 || y > canvas.height + 10) {
          s.dist = Math.random() * 3;
          continue;
        }

        // Draw streak
        const tailLen = Math.min(s.dist * 0.3, 40);
        const tx = x - Math.cos(s.angle) * tailLen;
        const ty = y - Math.sin(s.angle) * tailLen;

        const grad = ctx.createLinearGradient(tx, ty, x, y);
        grad.addColorStop(0, 'transparent');
        grad.addColorStop(1, `rgba(255, 255, 255, ${s.bright})`);

        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(x, y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = s.size;
        ctx.stroke();

        // Bright dot at head
        ctx.beginPath();
        ctx.arc(x, y, s.size * 0.8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${s.bright})`;
        ctx.fill();
      }

      frame++;
      if (frame < totalFrames) {
        requestAnimationFrame(draw);
      } else {
        window.location.href = GAME_PAGES[current];
      }
    }

    // Start with black
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    requestAnimationFrame(draw);
  }
</script>

</body>
</html>
