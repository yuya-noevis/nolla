<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, height=834">
<title>Nolla - S2 Account Creation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1194px; height: 834px; overflow: hidden; position: relative; font-family: 'Segoe UI', system-ui, sans-serif; background: #F5F0E8; }
.bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }

.container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; display: flex; gap: 80px; align-items: center; }

/* Left: nav character + welcome */
.left { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.navi-frame { width: 140px; height: 140px; border-radius: 32px; background: rgba(255,255,255,0.95); border: 4px solid rgba(210,185,150,0.5); box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.navi-frame img { width: 120px; height: 120px; object-fit: contain; }
.welcome-text { font-size: 20px; font-weight: 700; color: #5A4A3A; text-align: center; line-height: 1.6; }

/* Right: sign up form card */
.form-card { width: 440px; background: rgba(255,255,255,0.95); border: 3px solid rgba(210,185,150,0.4); border-radius: 24px; padding: 40px 36px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
.form-title { font-size: 22px; font-weight: 800; color: #333; margin-bottom: 28px; text-align: center; }

.input-group { margin-bottom: 18px; }
.input-label { font-size: 14px; font-weight: 600; color: #666; margin-bottom: 6px; display: block; }
.input-field { width: 100%; height: 48px; border: 2px solid rgba(210,185,150,0.5); border-radius: 12px; padding: 0 16px; font-size: 16px; color: #333; background: rgba(245,240,232,0.5); outline: none; }
.input-field::placeholder { color: #BBB; }

.divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
.divider-line { flex: 1; height: 1px; background: rgba(210,185,150,0.4); }
.divider-text { font-size: 13px; color: #999; }

.social-buttons { display: flex; gap: 12px; }
.social-btn { flex: 1; height: 48px; border: 2px solid rgba(210,185,150,0.4); border-radius: 12px; background: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: 600; color: #555; cursor: pointer; transition: background 0.2s; }
.social-btn:hover { background: rgba(245,240,232,0.8); }

.submit-btn { width: 100%; height: 52px; border: none; border-radius: 14px; background: linear-gradient(180deg, #6BA47A 0%, #5A8A6A 100%); color: white; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 24px; box-shadow: 0 4px 0 #4A7A58, 0 6px 14px rgba(0,0,0,0.15); transition: transform 0.15s; }
.submit-btn:hover { transform: translateY(-1px); }

/* Step indicator */
.step-indicator { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 8px; }
.step-dot { width: 10px; height: 10px; border-radius: 50%; }
.step-dot.active { background: #4A7BA7; }
.step-dot.inactive { background: rgba(74,123,167,0.2); }
</style>
</head>
<body>
  <img class="bg" src="assets/s_onboarding_bg.png" alt="">

  <!-- Step indicator: 1 of 4 -->
  <div class="step-indicator">
    <div class="step-dot active"></div>
    <div class="step-dot inactive"></div>
    <div class="step-dot inactive"></div>
    <div class="step-dot inactive"></div>
  </div>

  <div class="container">
    <!-- Left: character -->
    <div class="left">
      <div class="navi-frame">
        <img src="assets/navi_character.png" alt="">
      </div>
      <div class="welcome-text">
        はじめまして!<br>
        Nollaへようこそ
      </div>
    </div>

    <!-- Right: form -->
    <div class="form-card">
      <div class="form-title">アカウント作成</div>

      <div class="input-group">
        <label class="input-label">メールアドレス</label>
        <input class="input-field" type="email" placeholder="example@email.com">
      </div>
      <div class="input-group">
        <label class="input-label">パスワード</label>
        <input class="input-field" type="password" placeholder="8文字以上">
      </div>

      <button class="submit-btn">はじめる</button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">または</span>
        <div class="divider-line"></div>
      </div>

      <div class="social-buttons">
        <div class="social-btn">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M18.17 8.37H10v3.47h4.72C14.3 13.73 12.38 15 10 15c-2.76 0-5-2.24-5-5s2.24-5 5-5c1.22 0 2.34.44 3.21 1.17l2.5-2.5A8.96 8.96 0 0010 1C4.48 1 0 5.48 0 11s4.48 10 10 10 10-4.48 10-10c0-.54-.05-1.08-.14-1.6l.01-.03z" fill="#4285F4"/></svg>
          Google
        </div>
        <div class="social-btn">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M14.94 0H5.06A5.06 5.06 0 000 5.06v9.88A5.06 5.06 0 005.06 20h9.88A5.06 5.06 0 0020 14.94V5.06A5.06 5.06 0 0014.94 0zm-1.58 14.5c-.42.5-1.02.82-1.7.88h-3.48c-1.84-.1-3.36-1.52-3.58-3.32-.08-.52-.06-1.06.08-1.56.54-1.92 2.56-3.18 4.52-2.82.56.1 1.08.36 1.5.72l-1.14 1.12c-.5-.36-1.14-.44-1.7-.22-.84.32-1.38 1.18-1.28 2.08.1.86.76 1.56 1.62 1.7.62.1 1.24-.08 1.7-.48.26-.24.42-.56.48-.9h-2.02v-1.46h3.56c.06.32.08.64.06.96-.04.82-.34 1.6-.88 2.22l.02.08z" fill="#333"/></svg>
          Apple
        </div>
      </div>
    </div>
  </div>
</body>
</html>
