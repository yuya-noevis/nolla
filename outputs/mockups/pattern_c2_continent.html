<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, height=834">
<title>Nolla - Pattern C2: Continent Map</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1194px;
    height: 834px;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    position: relative;
  }

  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* Dim overlay to make UI readable */
  .bg-dim {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.08);
    z-index: 0;
  }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  /* Top Bar */
  .top-bar {
    position: absolute;
    top: 16px;
    left: 24px;
    right: 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
  }

  .character-greeting {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .character-greeting img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2));
  }

  .greeting-bubble {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 7px 14px;
    font-family: 'Fredoka', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #333;
    border: 2.5px solid rgba(74, 123, 167, 0.3);
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    position: relative;
  }

  .greeting-bubble::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 50%;
    transform: translateY(-50%);
    border: 6px solid transparent;
    border-right-color: rgba(255, 255, 255, 0.92);
  }

  .top-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .star-count {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 6px 14px;
    border: 2.5px solid rgba(212, 165, 116, 0.4);
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    font-family: 'Fredoka', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #333;
  }

  .adult-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    border: 2.5px solid rgba(74, 123, 167, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
  }

  /* Region hotspots */
  .region {
    position: absolute;
    cursor: pointer;
    transition: transform 0.2s ease;
    z-index: 5;
  }

  .region:hover {
    transform: scale(1.04);
  }

  .region-highlight {
    position: absolute;
    inset: -6px;
    border-radius: 20px;
    border: 3px solid rgba(255,255,255,0.5);
    box-shadow: 0 0 20px rgba(255,255,255,0.3), inset 0 0 20px rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .region:hover .region-highlight {
    opacity: 1;
  }

  .region-label {
    position: absolute;
    bottom: -32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 4px 12px;
    font-family: 'Fredoka', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    border: 2px solid rgba(212, 165, 116, 0.3);
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }

  .region:hover .region-label {
    opacity: 1;
  }

  .region-icon {
    font-size: 24px;
    margin-right: 4px;
  }

  /* Approximate region positions on the continent map */
  .region-everwood    { top: 80px;  left: 60px;  width: 240px; height: 200px; }
  .region-frostpeak   { top: 50px;  left: 340px; width: 260px; height: 220px; }
  .region-crystal     { top: 70px;  right: 40px; width: 260px; height: 220px; }
  .region-sunhaven    { bottom: 80px; left: 80px; width: 260px; height: 220px; }
  .region-sands       { bottom: 60px; right: 40px; width: 300px; height: 240px; }

  /* Fog overlay at edges for "undiscovered" feel */
  .fog-edge {
    position: absolute;
    z-index: 4;
    pointer-events: none;
  }

  .fog-bottom {
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: linear-gradient(to top, rgba(200,210,220,0.6), transparent);
  }

  .fog-right {
    top: 0;
    right: 0;
    bottom: 0;
    width: 40px;
    background: linear-gradient(to left, rgba(200,210,220,0.4), transparent);
  }

  /* Compass */
  .compass {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 48px;
    height: 48px;
    z-index: 3;
    opacity: 0.7;
  }

  /* Bottom nav */
  .bottom-nav {
    position: absolute;
    bottom: 16px;
    right: 24px;
    display: flex;
    gap: 12px;
    z-index: 10;
  }

  .nav-btn {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    border: 2.5px solid rgba(107, 164, 122, 0.4);
    box-shadow: 0 3px 12px rgba(0,0,0,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  .nav-btn:hover { transform: translateY(-3px); }
  .nav-btn img { width: 36px; height: 36px; object-fit: contain; }

  /* Zoom hint */
  .zoom-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 6px 18px;
    font-family: 'Fredoka', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #666;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border: 2px solid rgba(74, 123, 167, 0.2);
    z-index: 10;
    animation: pulse-hint 2s ease-in-out infinite;
  }

  @keyframes pulse-hint {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  .pattern-label {
    position: absolute;
    bottom: 4px;
    left: 12px;
    font-family: 'Fredoka', sans-serif;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
    z-index: 10;
  }
</style>
</head>
<body>
  <img class="bg" src="assets/continent_map_bg.png" alt="continent map">
  <div class="bg-dim"></div>

  <div class="overlay">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="character-greeting">
        <img src="assets/navi_character.png" alt="navi">
        <div class="greeting-bubble">どのエリアにいく?</div>
      </div>
      <div class="top-right">
        <div class="star-count">
          <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
            <path d="M16 2L20.1 11.6L30 12.9L22.8 19.6L24.8 30L16 24.8L7.2 30L9.2 19.6L2 12.9L11.9 11.6L16 2Z" fill="#D4A574" stroke="#C49464" stroke-width="1.5"/>
          </svg>
          <span>128</span>
        </div>
        <div class="adult-btn">
          <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
            <rect x="6" y="12" width="16" height="12" rx="3" fill="#4A7BA7" opacity="0.6"/>
            <path d="M10 12V9C10 6.8 11.8 5 14 5C16.2 5 18 6.8 18 9V12" stroke="#4A7BA7" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Tappable Region Hotspots -->
    <div class="region region-everwood">
      <div class="region-highlight"></div>
      <div class="region-label">
        <span class="region-icon">🌳</span> ワーキングメモリの森
      </div>
    </div>

    <div class="region region-frostpeak">
      <div class="region-highlight"></div>
      <div class="region-label">
        <span class="region-icon">🏔</span> よくそくの山
      </div>
    </div>

    <div class="region region-crystal">
      <div class="region-highlight"></div>
      <div class="region-label">
        <span class="region-icon">💎</span> ちゅういの湖
      </div>
    </div>

    <div class="region region-sunhaven">
      <div class="region-highlight"></div>
      <div class="region-label">
        <span class="region-icon">🏡</span> なかまの村
      </div>
    </div>

    <div class="region region-sands">
      <div class="region-highlight"></div>
      <div class="region-label">
        <span class="region-icon">🏜</span> きりかえの砂漠
      </div>
    </div>

    <!-- Fog edges -->
    <div class="fog-edge fog-bottom"></div>
    <div class="fog-edge fog-right"></div>

    <!-- Zoom Hint -->
    <div class="zoom-hint">タップしてエリアにズームイン</div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <div class="nav-btn" title="マイルーム">
        <img src="assets/icon_myroom.png" alt="myroom">
      </div>
      <div class="nav-btn" title="ショップ">
        <img src="assets/icon_shop.png" alt="shop">
      </div>
    </div>
  </div>

  <div class="pattern-label">Pattern C2: Continent Map</div>
</body>
</html>
