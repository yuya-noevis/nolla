<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, height=834">
<title>Nolla - Home: Theater</title>
<link rel="stylesheet" href="home_carousel.css">
</head>
<body>
  <img class="bg" src="assets/home_theater_bg.png" alt="">

  <div class="top-left">
    <div class="char-frame"><img src="assets/navi_character.png" alt=""></div>
  </div>

  <div class="top-right">
    <div class="star-badge">
      <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2L14.9 8.6L22 9.5L16.8 14.2L18.2 22L12 18.4L5.8 22L7.2 14.2L2 9.5L9.1 8.6L12 2Z" fill="#DAA520" stroke="#B8860B" stroke-width="1"/></svg>
      <span>128</span>
    </div>
    <div class="lock-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2" fill="#999"/><path d="M8 11V8C8 5.8 9.8 4 12 4C14.2 4 16 5.8 16 8V11" stroke="#999" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
  </div>

  <div class="arrow arrow-left">
    <svg width="24" height="24" viewBox="0 0 24 24"><path d="M15 4L7 12L15 20" stroke="#FFF" stroke-width="4" fill="none" stroke-linecap="square" stroke-linejoin="miter"/></svg>
  </div>
  <div class="arrow arrow-right">
    <svg width="24" height="24" viewBox="0 0 24 24"><path d="M9 4L17 12L9 20" stroke="#FFF" stroke-width="4" fill="none" stroke-linecap="square" stroke-linejoin="miter"/></svg>
  </div>

  <div class="game-sign"><span>おはなし</span></div>

  <div class="dots">
    <div class="dot inactive"></div>
    <div class="dot inactive"></div>
    <div class="dot inactive"></div>
    <div class="dot inactive"></div>
    <div class="dot active"></div>
  </div>

  <div class="myroom-btn">
    <svg width="36" height="36" viewBox="0 0 36 36">
      <path d="M18 4L3 18H7V31H15V22H21V31H29V18H33L18 4Z" fill="#D4A574" stroke="#B8906A" stroke-width="1.5"/>
    </svg>
  </div>
</body>
</html>
