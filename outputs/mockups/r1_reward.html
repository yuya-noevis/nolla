<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nolla R1 - Reward</title>
<style>
  :root {
    --sky-top: #1A40A0;
    --sky-mid: #4838A0;
    --sky-bottom: #8050A0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .screen {
    position: relative;
    width: 1194px;
    height: 834px;
    overflow: hidden;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 50%, var(--sky-bottom) 100%);
  }

  /* Stars */
  .stars-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.2; }
    100% { opacity: 0.7; }
  }

  /* Main reward star */
  .reward-star {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 220px;
    height: 220px;
    background: url('star_reward.png') center/contain no-repeat;
    z-index: 10;
    opacity: 0;
    animation: starAppear 1.2s 0.3s ease-out forwards;
  }

  @keyframes starAppear {
    0% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2) rotate(-30deg);
    }
    50% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.15) rotate(5deg);
    }
    70% {
      transform: translate(-50%, -50%) scale(0.95) rotate(-2deg);
    }
    100% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1) rotate(0deg);
    }
  }

  /* Star glow */
  .reward-glow {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 360px;
    height: 360px;
    background: radial-gradient(circle, rgba(255, 215, 0, 0.25) 0%, transparent 70%);
    border-radius: 50%;
    z-index: 9;
    opacity: 0;
    animation: glowIn 1s 0.8s ease-out forwards;
  }
  @keyframes glowIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  /* Falling mini stars */
  .falling-star {
    position: absolute;
    background: url('star_reward.png') center/contain no-repeat;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
  }
  @keyframes fall {
    0% { opacity: 0.7; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(600px) rotate(360deg); }
  }

  /* Burst particles */
  .burst-particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 8;
    animation: burst 1s ease-out forwards;
  }
  @keyframes burst {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
  }

  /* Star count */
  .star-count {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0;
    animation: countIn 0.5s 1.8s ease-out forwards;
  }
  @keyframes countIn {
    0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .star-count-icon {
    width: 32px;
    height: 32px;
    background: url('star_reward.png') center/contain no-repeat;
  }
  .star-count-dots {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    max-width: 160px;
  }
  .count-dot {
    width: 8px;
    height: 8px;
    background: #FFD700;
    border-radius: 50%;
    opacity: 0.5;
  }
  .count-dot.new {
    opacity: 1;
    animation: dotPop 0.3s ease-out;
  }
  @keyframes dotPop {
    0% { transform: scale(0); }
    70% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  /* Buttons */
  .buttons {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 80px;
    z-index: 20;
    opacity: 0;
    animation: buttonsIn 0.6s 2.2s ease-out forwards;
  }
  @keyframes buttonsIn {
    0% { opacity: 0; transform: translateX(-50%) translateY(30px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .btn {
    width: 140px;
    height: 140px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .btn:hover { transform: scale(1.1); }
  .btn-replay { background-image: url('btn_replay.png'); }
  .btn-myroom { background-image: url('btn_myroom.png'); }
</style>
</head>
<body>

<div class="screen" id="screen">
  <div class="stars-layer" id="stars-layer"></div>
  <div class="reward-glow"></div>
  <div class="reward-star"></div>

  <div class="star-count">
    <div class="star-count-icon"></div>
    <div class="star-count-dots" id="count-dots"></div>
  </div>

  <div class="buttons">
    <div class="btn btn-replay" onclick="replay()"></div>
    <div class="btn btn-myroom" onclick="goMyRoom()"></div>
  </div>
</div>

<script>
  // Background stars
  const starsLayer = document.getElementById('stars-layer');
  for (let i = 0; i < 35; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width: ${size}px; height: ${size}px;
      top: ${Math.random() * 100}%;
      left: ${Math.random() * 100}%;
      animation-delay: ${Math.random() * 3}s;
      animation-duration: ${2 + Math.random() * 3}s;
    `;
    starsLayer.appendChild(s);
  }

  // Burst particles
  const screen = document.getElementById('screen');
  setTimeout(() => {
    const cx = 597, cy = 350;
    for (let i = 0; i < 16; i++) {
      const p = document.createElement('div');
      p.className = 'burst-particle';
      const angle = (Math.PI * 2 / 16) * i;
      const dist = 80 + Math.random() * 80;
      const size = 4 + Math.random() * 8;
      const color = Math.random() > 0.4 ? '#FFD700' : '#FFFFFF';
      p.style.cssText = `
        left: ${cx}px; top: ${cy}px;
        width: ${size}px; height: ${size}px;
        background: ${color};
        --tx: ${Math.cos(angle) * dist}px;
        --ty: ${Math.sin(angle) * dist}px;
        animation-delay: ${Math.random() * 0.15}s;
      `;
      screen.appendChild(p);
      setTimeout(() => p.remove(), 1200);
    }
  }, 800);

  // Falling mini stars
  setTimeout(() => {
    for (let i = 0; i < 8; i++) {
      const s = document.createElement('div');
      s.className = 'falling-star';
      const size = 16 + Math.random() * 28;
      s.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 1100 + 47}px;
        top: ${-50 - Math.random() * 100}px;
        animation: fall ${2 + Math.random() * 2}s ${Math.random() * 1.5}s ease-in forwards;
      `;
      screen.appendChild(s);
    }
  }, 600);

  // Star count dots (12 existing + 1 new)
  const countDots = document.getElementById('count-dots');
  for (let i = 0; i < 12; i++) {
    const d = document.createElement('div');
    d.className = 'count-dot';
    countDots.appendChild(d);
  }
  setTimeout(() => {
    const d = document.createElement('div');
    d.className = 'count-dot new';
    countDots.appendChild(d);
  }, 2200);

  function replay() {
    window.location.href = 'm4_memory_match.html';
  }
  function goMyRoom() {
    window.location.href = 'r2_myroom.html';
  }
</script>

</body>
</html>
