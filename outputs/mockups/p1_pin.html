<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nolla P1 - PIN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F5F5F5; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Quicksand', sans-serif; }
  .screen { position: relative; width: 1194px; height: 834px; overflow: hidden; background: #F5F5F5; display: flex; align-items: center; justify-content: center; }

  .pin-card {
    display: flex; flex-direction: column; align-items: center; gap: 32px;
  }
  .pin-title { font-size: 20px; font-weight: 700; color: #333; }

  .pin-dots { display: flex; gap: 20px; }
  .pin-dot {
    width: 20px; height: 20px; border-radius: 50%;
    border: 3px solid #4A7BA7;
    transition: background 0.2s;
  }
  .pin-dot.filled { background: #4A7BA7; }

  .keypad {
    display: grid; grid-template-columns: repeat(3, 80px); gap: 16px;
  }
  .key {
    width: 80px; height: 80px; border-radius: 50%;
    background: white; border: 2px solid #E0E0E0;
    font-size: 28px; font-weight: 700; color: #333;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .key:hover { background: #F0F0F0; }
  .key:active { transform: scale(0.95); background: #E8E8E8; }
  .key.empty { border: none; background: transparent; cursor: default; }
  .key.delete { font-size: 16px; color: #888; border: none; background: transparent; }

  .btn-back {
    position: absolute; top: 20px; left: 24px;
    width: 80px; height: 80px;
    background: url('arrow_left.png') center/contain no-repeat;
    cursor: pointer; opacity: 0.5; transition: opacity 0.2s;
  }
  .btn-back:hover { opacity: 0.8; }
</style>
</head>
<body>
<div class="screen">
  <div class="btn-back" onclick="location.href='m1_galaxy_carousel.html'"></div>
  <div class="pin-card">
    <div class="pin-title">保護者用PINを入力</div>
    <div class="pin-dots" id="dots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="keypad" id="keypad"></div>
  </div>
</div>
<script>
  let pin = '';
  const dots = document.querySelectorAll('.pin-dot');
  const keypad = document.getElementById('keypad');
  const nums = [1,2,3,4,5,6,7,8,9,null,0,'del'];
  nums.forEach(n => {
    const k = document.createElement('button');
    if (n === null) { k.className = 'key empty'; }
    else if (n === 'del') { k.className = 'key delete'; k.textContent = '←'; k.onclick = () => { pin = pin.slice(0,-1); updateDots(); }; }
    else { k.className = 'key'; k.textContent = n; k.onclick = () => { if (pin.length < 4) { pin += n; updateDots(); if (pin.length === 4) setTimeout(() => location.href = 'p2_dashboard.html', 300); } }; }
    keypad.appendChild(k);
  });
  function updateDots() { dots.forEach((d, i) => d.classList.toggle('filled', i < pin.length)); }
</script>
</body>
</html>
