<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nolla S2 - Account</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap');
  :root { --sky-top: #1840A0; --sky-mid: #3838A8; --sky-bottom: #7050A0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Quicksand', sans-serif; }
  .screen { position: relative; width: 1194px; height: 834px; overflow: hidden; background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 50%, var(--sky-bottom) 100%); display: flex; align-items: center; justify-content: center; }
  .stars-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s ease-in-out infinite alternate; }
  @keyframes twinkle { 0% { opacity: 0.15; } 100% { opacity: 0.5; } }

  .card {
    background: rgba(255,255,255,0.95);
    border-radius: 28px;
    padding: 48px 56px;
    width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .card-title { font-size: 24px; font-weight: 700; color: #333; text-align: center; }
  .card-sub { font-size: 14px; color: #888; text-align: center; }

  .input-field {
    width: 100%; padding: 14px 18px;
    border: 2px solid #E0E0E0; border-radius: 14px;
    font-size: 16px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .input-field:focus { border-color: #7050A0; }

  .btn-primary {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #6848A0, #4838A8);
    color: white; border: none; border-radius: 14px;
    font-size: 17px; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(72, 56, 168, 0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(72, 56, 168, 0.4); }

  .divider { display: flex; align-items: center; gap: 12px; color: #BBB; font-size: 13px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #E0E0E0; }

  .oauth-row { display: flex; gap: 16px; }
  .btn-oauth {
    flex: 1; padding: 14px;
    background: white; border: 2px solid #E0E0E0; border-radius: 14px;
    font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: border-color 0.2s, transform 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: #444;
  }
  .btn-oauth:hover { border-color: #BBB; transform: translateY(-1px); }

  .switch-mode { text-align: center; font-size: 13px; color: #888; }
  .switch-mode a { color: #6848A0; text-decoration: none; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="screen">
  <div class="stars-layer" id="sl"></div>
  <div class="card">
    <div class="card-title">アカウント作成</div>
    <div class="card-sub">保護者の方が登録してください</div>
    <input class="input-field" type="email" placeholder="メールアドレス">
    <input class="input-field" type="password" placeholder="パスワード">
    <button class="btn-primary" onclick="location.href='s3_assessment.html'">登録する</button>
    <div class="divider">または</div>
    <div class="oauth-row">
      <button class="btn-oauth"> Apple</button>
      <button class="btn-oauth"> Google</button>
    </div>
    <div class="switch-mode">すでにアカウントをお持ちの方は <a>ログイン</a></div>
  </div>
</div>
<script>
  const sl = document.getElementById('sl');
  for (let i = 0; i < 30; i++) { const s = document.createElement('div'); s.className = 'star'; const sz = Math.random()*3+1; s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`; sl.appendChild(s); }
</script>
</body>
</html>
