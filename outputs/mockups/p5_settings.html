<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, height=834">
<title>Nolla - P5 Settings</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1194px; height: 834px; overflow: hidden; position: relative; font-family: 'Segoe UI', system-ui, sans-serif; }
.bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }

/* Header */
.header { position: absolute; top: 0; left: 0; right: 0; height: 64px; background: rgba(255,255,255,0.95); border-bottom: 2px solid rgba(210,185,150,0.3); z-index: 10; display: flex; align-items: center; padding: 0 24px; }
.back-btn { width: 40px; height: 40px; border-radius: 10px; background: rgba(245,240,232,0.8); border: 2px solid rgba(210,185,150,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.header-title { font-size: 18px; font-weight: 700; color: #333; margin-left: 16px; }
.header-tabs { display: flex; gap: 4px; margin-left: auto; }
.header-tab { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; }
.header-tab.active { background: #4A7BA7; color: white; }

/* Main content: two-column layout */
.content { position: absolute; top: 80px; left: 24px; right: 24px; bottom: 24px; z-index: 10; display: flex; gap: 20px; }

/* Left nav */
.side-nav { width: 220px; display: flex; flex-direction: column; gap: 4px; }
.nav-item { padding: 14px 18px; border-radius: 12px; font-size: 14px; font-weight: 600; color: #666; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
.nav-item:hover { background: rgba(245,240,232,0.8); }
.nav-item.active { background: rgba(255,255,255,0.95); color: #333; border: 2px solid rgba(210,185,150,0.3); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

/* Right panel */
.panel { flex: 1; background: rgba(255,255,255,0.95); border: 2px solid rgba(210,185,150,0.3); border-radius: 16px; padding: 28px 32px; box-shadow: 0 4px 16px rgba(0,0,0,0.04); overflow-y: auto; }
.panel-title { font-size: 18px; font-weight: 800; color: #333; margin-bottom: 6px; }
.panel-sub { font-size: 13px; color: #999; margin-bottom: 24px; }

/* Setting rows */
.setting-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid rgba(210,185,150,0.2); }
.setting-row:last-child { border-bottom: none; }
.setting-info { flex: 1; }
.setting-label { font-size: 15px; font-weight: 600; color: #444; margin-bottom: 2px; }
.setting-desc { font-size: 12px; color: #999; }

/* Toggle switch */
.toggle { width: 52px; height: 28px; border-radius: 14px; position: relative; cursor: pointer; }
.toggle.on { background: #6BA47A; }
.toggle.off { background: #DDD; }
.toggle-knob { position: absolute; top: 3px; width: 22px; height: 22px; border-radius: 50%; background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: left 0.2s; }
.toggle.on .toggle-knob { left: 27px; }
.toggle.off .toggle-knob { left: 3px; }

/* Select dropdown */
.select-box { padding: 8px 16px; border: 2px solid rgba(210,185,150,0.4); border-radius: 10px; background: rgba(245,240,232,0.5); font-size: 14px; color: #555; font-weight: 600; }

/* Slider */
.setting-slider { display: flex; align-items: center; gap: 10px; }
.slider-bar { width: 120px; height: 6px; background: rgba(210,185,150,0.3); border-radius: 3px; position: relative; }
.slider-bar-fill { height: 100%; width: 60%; background: #4A7BA7; border-radius: 3px; }
.slider-bar-thumb { position: absolute; top: -5px; left: 60%; width: 16px; height: 16px; border-radius: 50%; background: white; border: 2px solid #4A7BA7; transform: translateX(-50%); }
.slider-val { font-size: 14px; font-weight: 700; color: #4A7BA7; min-width: 40px; }
</style>
</head>
<body>
  <img class="bg" src="assets/parent_bg.png" alt="">

  <!-- Header -->
  <div class="header">
    <div class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M15 5L8 12L15 19" stroke="#666" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="header-title">設定</div>
    <div class="header-tabs">
      <div class="header-tab">今日の記録</div>
      <div class="header-tab">成長の記録</div>
      <div class="header-tab">AIサポート</div>
      <div class="header-tab active">設定</div>
    </div>
  </div>

  <div class="content">
    <!-- Side nav -->
    <div class="side-nav">
      <div class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="#333" stroke-width="2"/><path d="M12 7V12L15 14" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        セッション
      </div>
      <div class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="#666" stroke-width="2"/><path d="M8 12H16M12 8V16" stroke="#666" stroke-width="2" stroke-linecap="round"/></svg>
        コンテンツ
      </div>
      <div class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="none" stroke="#666" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="none" stroke="#666" stroke-width="2"/></svg>
        眼球データ
      </div>
      <div class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 2L4 7V12C4 16.4 7.4 20.5 12 22C16.6 20.5 20 16.4 20 12V7L12 2Z" fill="none" stroke="#666" stroke-width="2"/></svg>
        音声認識
      </div>
      <div class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" fill="none" stroke="#666" stroke-width="2"/><path d="M4 20C4 16 7.6 13 12 13s8 3 8 7" stroke="#666" stroke-width="2" fill="none"/></svg>
        プロフィール
      </div>
    </div>

    <!-- Panel: session settings -->
    <div class="panel">
      <div class="panel-title">セッション設定</div>
      <div class="panel-sub">お子さまの利用時間や休憩に関する設定です</div>

      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-label">セッション時間の上限</div>
          <div class="setting-desc">設定時間を超えると休憩を提案します</div>
        </div>
        <div class="setting-slider">
          <div class="slider-bar">
            <div class="slider-bar-fill"></div>
            <div class="slider-bar-thumb"></div>
          </div>
          <span class="slider-val">60分</span>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-label">休憩提案の方式</div>
          <div class="setting-desc">提案: やめるかどうかお子さまが選べます</div>
        </div>
        <div class="select-box">提案</div>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-label">1日の利用回数の制限</div>
          <div class="setting-desc">1日に何セッションまで遊べるか</div>
        </div>
        <div class="toggle on"><div class="toggle-knob"></div></div>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-label">利用可能な時間帯</div>
          <div class="setting-desc">この時間帯以外はアプリを開けません</div>
        </div>
        <div class="select-box">6:00 - 21:00</div>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-label">ゲームアンロック方式</div>
          <div class="setting-desc">段階的: プレイに応じて新しいゲームが開放されます</div>
        </div>
        <div class="select-box">段階的</div>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-label">効果音</div>
          <div class="setting-desc">ゲーム内の効果音のON/OFF</div>
        </div>
        <div class="toggle on"><div class="toggle-knob"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
