<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nolla S1 - Splash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap');

  :root {
    --sky-top: #1840A0;
    --sky-mid: #3838A8;
    --sky-bottom: #7050A0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .screen {
    position: relative;
    width: 1194px;
    height: 834px;
    overflow: hidden;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 50%, var(--sky-bottom) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeOut 0.8s 3s ease-in forwards;
  }
  @keyframes fadeOut {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  .stars-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.15; }
    100% { opacity: 0.6; }
  }

  .logo-container {
    position: relative;
    z-index: 10;
    opacity: 0;
    animation: logoIn 1.5s 0.5s ease-out forwards;
  }

  @keyframes logoIn {
    0% {
      opacity: 0;
      transform: scale(0.8) translateY(20px);
      filter: blur(8px);
    }
    60% {
      opacity: 1;
      transform: scale(1.02) translateY(-3px);
      filter: blur(0);
    }
    100% {
      opacity: 1;
      transform: scale(1) translateY(0);
      filter: blur(0);
    }
  }

  .logo-text {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 160px;
    letter-spacing: 24px;
    color: #FFFFFF;
    text-shadow:
      0 0 30px rgba(160, 120, 220, 0.6),
      0 0 60px rgba(120, 80, 200, 0.3),
      0 0 100px rgba(80, 60, 180, 0.2),
      0 2px 4px rgba(0, 0, 0, 0.2);
  }

  .logo-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 200px;
    background: radial-gradient(ellipse, rgba(140, 100, 210, 0.2) 0%, transparent 70%);
    z-index: 5;
    opacity: 0;
    animation: glowIn 2s 1s ease-out forwards;
  }
  @keyframes glowIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="screen">
  <div class="stars-layer" id="stars-layer"></div>
  <div class="logo-glow"></div>
  <div class="logo-container">
    <div class="logo-text">nolla</div>
  </div>
</div>

<script>
  const starsLayer = document.getElementById('stars-layer');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`;
    starsLayer.appendChild(s);
  }

  setTimeout(() => {
    window.location.href = 'm1_galaxy_carousel.html';
  }, 3800);
</script>

</body>
</html>
