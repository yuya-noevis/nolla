<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nolla R2 - My Room</title>
<style>
  :root {
    --sky-top: #1A3898;
    --sky-mid: #3830A0;
    --sky-bottom: #6848A0;
    --ui-backdrop: rgba(0, 0, 0, 0.2);
    --star-gold: #FFD700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .screen {
    position: relative;
    width: 1194px;
    height: 834px;
    overflow: hidden;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 50%, var(--sky-bottom) 100%);
  }

  .stars-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.2; }
    100% { opacity: 0.6; }
  }

  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    z-index: 50;
  }

  .btn-back {
    width: 80px;
    height: 80px;
    background: url('arrow_left.png') center/contain no-repeat;
    cursor: pointer;
    opacity: 0.75;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn-back:hover { opacity: 1; transform: scale(1.1); }

  .star-balance {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    background: var(--ui-backdrop);
    border-radius: 16px;
  }
  .star-balance-icon {
    width: 28px;
    height: 28px;
    background: url('star_reward.png') center/contain no-repeat;
  }
  .star-balance-dots {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    max-width: 120px;
  }
  .bal-dot {
    width: 7px;
    height: 7px;
    background: var(--star-gold);
    border-radius: 50%;
    opacity: 0.7;
  }

  .tabs {
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 24px;
    z-index: 40;
  }

  .tab {
    width: 100px;
    height: 100px;
    cursor: pointer;
    transition: transform 0.2s;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    position: relative;
    opacity: 0.5;
  }
  .tab:hover { transform: scale(1.08); }
  .tab.active {
    opacity: 1;
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
  }

  .tab-room { background-image: url('tab_room.png'); }
  .tab-shop { background-image: url('tab_shop.png'); }
  .tab-collection { background-image: url('tab_collection.png'); }

  .content {
    position: absolute;
    top: 230px;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 520px;
    z-index: 30;
  }

  .panel { display: none; width: 100%; height: 100%; }
  .panel.active { display: block; }

  .room-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    height: 100%;
    padding: 20px;
    background: rgba(0, 0, 0, 0.15);
    border-radius: 24px;
    border: 2px solid rgba(255, 255, 255, 0.08);
  }

  .room-slot {
    border-radius: 16px;
    border: 2px dashed rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
  }
  .room-slot.occupied { border-color: transparent; }
  .room-slot img { width: 80%; height: 80%; object-fit: contain; }

  .shop-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 20px;
  }

  .shop-item {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 20px;
    border: 2px solid rgba(255, 255, 255, 0.08);
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }
  .shop-item:hover { transform: scale(1.05); border-color: rgba(255, 215, 0, 0.3); }

  .shop-item-img {
    width: 100px;
    height: 100px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }

  .shop-item-price {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .price-star {
    width: 18px;
    height: 18px;
    background: url('star_reward.png') center/contain no-repeat;
  }
  .price-dots { display: flex; gap: 3px; }
  .price-dot {
    width: 6px;
    height: 6px;
    background: var(--star-gold);
    border-radius: 50%;
  }

  .collection-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    padding: 20px;
  }

  .collection-item {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 16px;
    border: 2px solid rgba(255, 255, 255, 0.08);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .collection-item.owned { border-color: rgba(93, 187, 93, 0.3); }
  .collection-item.locked { opacity: 0.4; }
  .collection-item img { width: 70%; height: 70%; object-fit: contain; }
</style>
</head>
<body>

<div class="screen">
  <div class="stars-layer" id="stars-layer"></div>

  <div class="top-bar">
    <div class="btn-back" onclick="goBack()"></div>
    <div class="star-balance">
      <div class="star-balance-icon"></div>
      <div class="star-balance-dots" id="balance-dots"></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab tab-room active" onclick="switchTab('room')"></div>
    <div class="tab tab-shop" onclick="switchTab('shop')"></div>
    <div class="tab tab-collection" onclick="switchTab('collection')"></div>
  </div>

  <div class="content">
    <div class="panel active" id="panel-room">
      <div class="room-grid" id="room-grid"></div>
    </div>
    <div class="panel" id="panel-shop">
      <div class="shop-grid" id="shop-grid"></div>
    </div>
    <div class="panel" id="panel-collection">
      <div class="collection-grid" id="collection-grid"></div>
    </div>
  </div>
</div>

<script>
  // Stars
  const starsLayer = document.getElementById('stars-layer');
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`;
    starsLayer.appendChild(s);
  }

  // Balance dots (13 stars)
  const balDots = document.getElementById('balance-dots');
  for (let i = 0; i < 13; i++) {
    const d = document.createElement('div');
    d.className = 'bal-dot';
    balDots.appendChild(d);
  }

  const ITEMS = [
    { id: 'rocket', img: 'item_rocket.png', price: 3, owned: true },
    { id: 'flower', img: 'item_flower.png', price: 2, owned: true },
    { id: 'globe', img: 'item_globe.png', price: 5, owned: false },
    { id: 'lamp', img: 'item_lamp.png', price: 3, owned: false },
  ];

  // Room
  const roomGrid = document.getElementById('room-grid');
  const placed = [{ pos: 1, item: 'rocket' }, { pos: 7, item: 'flower' }];
  for (let i = 0; i < 15; i++) {
    const slot = document.createElement('div');
    slot.className = 'room-slot';
    const p = placed.find(x => x.pos === i);
    if (p) {
      const item = ITEMS.find(x => x.id === p.item);
      slot.classList.add('occupied');
      slot.innerHTML = '<img src="' + item.img + '" alt="">';
    }
    roomGrid.appendChild(slot);
  }

  // Shop
  const shopGrid = document.getElementById('shop-grid');
  ITEMS.forEach(item => {
    const el = document.createElement('div');
    el.className = 'shop-item';
    let priceDots = '';
    for (let i = 0; i < item.price; i++) priceDots += '<div class="price-dot"></div>';
    el.innerHTML = '<div class="shop-item-img" style="background-image:url(\'' + item.img + '\')"></div><div class="shop-item-price"><div class="price-star"></div><div class="price-dots">' + priceDots + '</div></div>';
    if (item.owned) { el.style.opacity = '0.5'; el.style.pointerEvents = 'none'; }
    shopGrid.appendChild(el);
  });

  // Collection
  const collGrid = document.getElementById('collection-grid');
  ITEMS.forEach(item => {
    const el = document.createElement('div');
    el.className = 'collection-item ' + (item.owned ? 'owned' : 'locked');
    if (item.owned) el.innerHTML = '<img src="' + item.img + '" alt="">';
    collGrid.appendChild(el);
  });
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'collection-item locked';
    collGrid.appendChild(el);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelector('.tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  function goBack() { window.location.href = 'm1_galaxy_carousel.html'; }
</script>

</body>
</html>
