<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, height=834">
<title>Nolla - M4 なかまわけ ゲームプレイ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1194px; height: 834px; overflow: hidden; position: relative; font-family: 'Segoe UI', system-ui, sans-serif; }
.bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }

/* Top-left: nav character + progress */
.top-left { position: absolute; top: 16px; left: 20px; display: flex; align-items: center; gap: 10px; z-index: 10; }
.char-frame { width: 64px; height: 64px; border-radius: 16px; background: rgba(255,255,255,0.92); border: 3px solid rgba(210,185,150,0.5); box-shadow: 0 4px 14px rgba(0,0,0,0.12); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.char-frame img { width: 56px; height: 56px; object-fit: contain; }
.progress-bar { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.88); border: 3px solid rgba(210,185,150,0.4); border-radius: 14px; padding: 8px 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
.prog-dot { width: 18px; height: 18px; border-radius: 5px; }
.prog-dot.done { background: #6BA47A; }
.prog-dot.current { background: #D4A574; animation: pulse-dot 1.5s ease-in-out infinite; }
.prog-dot.todo { background: rgba(0,0,0,0.08); }
@keyframes pulse-dot { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

/* Top-right: star count + back */
.top-right { position: absolute; top: 16px; right: 20px; display: flex; align-items: center; gap: 10px; z-index: 10; }
.star-badge { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.92); border: 3px solid rgba(218,165,32,0.35); border-radius: 18px; padding: 6px 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
.star-badge span { font-size: 20px; font-weight: 800; color: #333; }
.back-btn { width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.85); border: 2px solid rgba(210,185,150,0.4); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

/* Rule sign (top center) */
.rule-sign { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; align-items: center; gap: 12px; background: linear-gradient(180deg, #E8D5B5 0%, #D4B896 100%); border: 4px solid #B8A07A; border-radius: 16px; padding: 10px 28px; box-shadow: 0 6px 0 #A88E6C, 0 8px 18px rgba(0,0,0,0.18); }
.rule-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.rule-arrow { font-size: 24px; color: #7A6548; }
.rule-text-icon { display: flex; gap: 8px; }
.color-circle { width: 32px; height: 32px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.6); box-shadow: 0 2px 6px rgba(0,0,0,0.15); }

/* Center item (the object to sort) */
.center-item { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -65%); z-index: 10; }
.item-card { width: 140px; height: 140px; background: rgba(255,255,255,0.95); border: 4px solid rgba(210,185,150,0.6); border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; animation: float-item 3s ease-in-out infinite; }
@keyframes float-item { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

/* Bottom: sorting boxes */
.boxes-area { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); display: flex; gap: 80px; z-index: 10; }
.sort-box { width: 160px; height: 140px; border-radius: 16px; position: relative; cursor: pointer; transition: transform 0.2s; }
.sort-box:hover { transform: scale(1.05); }
.box-body { width: 100%; height: 100%; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }

/* Blue box */
.box-blue .box-body {
  background: linear-gradient(180deg, #C4D7E8 0%, #8FB8D4 60%, #7AA5C4 100%);
  border: 4px solid #6B96B5;
  box-shadow: 0 6px 0 #5A8099, 0 8px 20px rgba(0,0,0,0.18);
}
/* Red box (muted) */
.box-coral .box-body {
  background: linear-gradient(180deg, #E8CACA 0%, #D4A0A0 60%, #C48A8A 100%);
  border: 4px solid #B57A7A;
  box-shadow: 0 6px 0 #996A6A, 0 8px 20px rgba(0,0,0,0.18);
}

.box-label { width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; }
.box-lid { position: absolute; top: -8px; left: 5%; width: 90%; height: 20px; background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent); border-radius: 12px 12px 0 0; }

/* Hand hint animation */
.hand-hint { position: absolute; top: 50%; left: 50%; transform: translate(40px, 60px); z-index: 20; opacity: 0.7; animation: hint-move 3s ease-in-out infinite; }
@keyframes hint-move {
  0% { transform: translate(40px, 60px); opacity: 0.7; }
  30% { transform: translate(40px, 60px); opacity: 0.7; }
  60% { transform: translate(-180px, 200px); opacity: 0.9; }
  80% { transform: translate(-180px, 200px); opacity: 0.4; }
  100% { transform: translate(40px, 60px); opacity: 0.7; }
}

/* Feedback overlay (showing success state) */
.feedback-star { position: absolute; top: 35%; right: 25%; z-index: 15; animation: star-pop 1s ease-out forwards; opacity: 0; }
@keyframes star-pop { 0% { transform: scale(0) rotate(0deg); opacity: 0; } 50% { transform: scale(1.3) rotate(15deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 0.9; } }

/* Wood texture overlay for boxes */
.wood-lines { position: absolute; inset: 0; border-radius: 12px; overflow: hidden; pointer-events: none; opacity: 0.15; }
.wood-line { height: 2px; background: rgba(90,60,30,0.4); margin: 12px 8px; border-radius: 1px; }
</style>
</head>
<body>
  <img class="bg" src="assets/m4_nakamawake_bg.png" alt="">

  <!-- Top-left: nav character + trial progress -->
  <div class="top-left">
    <div class="char-frame"><img src="assets/navi_character.png" alt=""></div>
    <div class="progress-bar">
      <div class="prog-dot done"></div>
      <div class="prog-dot done"></div>
      <div class="prog-dot done"></div>
      <div class="prog-dot current"></div>
      <div class="prog-dot todo"></div>
      <div class="prog-dot todo"></div>
      <div class="prog-dot todo"></div>
      <div class="prog-dot todo"></div>
      <div class="prog-dot todo"></div>
      <div class="prog-dot todo"></div>
    </div>
  </div>

  <!-- Top-right: star count + back -->
  <div class="top-right">
    <div class="star-badge">
      <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2L14.9 8.6L22 9.5L16.8 14.2L18.2 22L12 18.4L5.8 22L7.2 14.2L2 9.5L9.1 8.6L12 2Z" fill="#DAA520" stroke="#B8860B" stroke-width="1"/></svg>
      <span>128</span>
    </div>
    <div class="back-btn">
      <svg width="24" height="24" viewBox="0 0 24 24"><path d="M15 5L8 12L15 19" stroke="#999" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <!-- Rule sign (top center) - "Sort by COLOR" shown with icons only -->
  <div class="rule-sign">
    <div class="rule-text-icon">
      <div class="color-circle" style="background: #8FB8D4;"></div>
      <svg width="28" height="28" viewBox="0 0 24 24" style="align-self: center;"><path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="#7A6548" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <svg width="40" height="40" viewBox="0 0 40 40" style="align-self: center;">
        <rect x="2" y="2" width="36" height="36" rx="8" fill="#C4D7E8" stroke="#6B96B5" stroke-width="2"/>
      </svg>
    </div>
    <div style="width: 2px; height: 32px; background: rgba(122,101,72,0.3); border-radius: 1px;"></div>
    <div class="rule-text-icon">
      <div class="color-circle" style="background: #D4A0A0;"></div>
      <svg width="28" height="28" viewBox="0 0 24 24" style="align-self: center;"><path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="#7A6548" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <svg width="40" height="40" viewBox="0 0 40 40" style="align-self: center;">
        <rect x="2" y="2" width="36" height="36" rx="8" fill="#E8CACA" stroke="#B57A7A" stroke-width="2"/>
      </svg>
    </div>
  </div>

  <!-- Center: item to sort (blue apple = goes to blue box) -->
  <div class="center-item">
    <div class="item-card">
      <svg width="90" height="90" viewBox="0 0 90 90">
        <!-- Deformed apple shape in blue tones -->
        <ellipse cx="45" cy="52" rx="32" ry="30" fill="#8FB8D4" stroke="#6B96B5" stroke-width="3"/>
        <ellipse cx="45" cy="52" rx="32" ry="30" fill="url(#apple-shine)" opacity="0.3"/>
        <path d="M45 22C45 22 50 10 56 14C62 18 48 24 45 22Z" fill="#6BA47A" stroke="#5A8A6A" stroke-width="1.5"/>
        <path d="M43 26C43 26 42 16 45 22" stroke="#8B6B4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Cute face -->
        <circle cx="36" cy="48" r="3.5" fill="#5A8A9A"/>
        <circle cx="54" cy="48" r="3.5" fill="#5A8A9A"/>
        <circle cx="37" cy="47" r="1.2" fill="white"/>
        <circle cx="55" cy="47" r="1.2" fill="white"/>
        <path d="M40 58Q45 63 50 58" stroke="#5A8A9A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Cheek blush -->
        <ellipse cx="30" cy="54" rx="5" ry="3" fill="#B5CDE0" opacity="0.6"/>
        <ellipse cx="60" cy="54" rx="5" ry="3" fill="#B5CDE0" opacity="0.6"/>
        <defs>
          <radialGradient id="apple-shine" cx="35%" cy="35%"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="transparent"/></radialGradient>
        </defs>
      </svg>
    </div>
  </div>

  <!-- Hand hint (tutorial: pointing from item toward blue box) -->
  <div class="hand-hint">
    <svg width="48" height="48" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="20" fill="rgba(255,255,255,0.6)" stroke="rgba(210,185,150,0.6)" stroke-width="2"/>
      <path d="M24 12V28M24 28L18 22M24 28L30 22" stroke="#7A6548" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Bottom: sorting boxes -->
  <div class="boxes-area">
    <!-- Blue box -->
    <div class="sort-box box-blue">
      <div class="box-lid"></div>
      <div class="box-body">
        <div class="wood-lines">
          <div class="wood-line"></div>
          <div class="wood-line"></div>
          <div class="wood-line"></div>
          <div class="wood-line"></div>
          <div class="wood-line"></div>
        </div>
        <div class="box-label">
          <div style="width: 32px; height: 32px; border-radius: 50%; background: #8FB8D4; border: 2px solid #6B96B5;"></div>
        </div>
        <!-- Items already sorted (small) -->
        <div style="display: flex; gap: 6px; margin-top: 4px;">
          <svg width="28" height="28" viewBox="0 0 28 28"><ellipse cx="14" cy="16" rx="10" ry="9" fill="#8FB8D4" stroke="#6B96B5" stroke-width="1.5"/><circle cx="11" cy="14" r="1.5" fill="#5A8A9A"/><circle cx="17" cy="14" r="1.5" fill="#5A8A9A"/></svg>
          <svg width="28" height="28" viewBox="0 0 28 28"><rect x="4" y="6" width="20" height="16" rx="4" fill="#8FB8D4" stroke="#6B96B5" stroke-width="1.5"/><circle cx="11" cy="14" r="1.5" fill="#5A8A9A"/><circle cx="17" cy="14" r="1.5" fill="#5A8A9A"/></svg>
        </div>
      </div>
    </div>

    <!-- Coral/muted-red box -->
    <div class="sort-box box-coral">
      <div class="box-lid"></div>
      <div class="box-body">
        <div class="wood-lines">
          <div class="wood-line"></div>
          <div class="wood-line"></div>
          <div class="wood-line"></div>
          <div class="wood-line"></div>
          <div class="wood-line"></div>
        </div>
        <div class="box-label">
          <div style="width: 32px; height: 32px; border-radius: 50%; background: #D4A0A0; border: 2px solid #B57A7A;"></div>
        </div>
        <!-- One item already sorted -->
        <div style="display: flex; gap: 6px; margin-top: 4px;">
          <svg width="28" height="28" viewBox="0 0 28 28"><ellipse cx="14" cy="16" rx="10" ry="9" fill="#D4A0A0" stroke="#B57A7A" stroke-width="1.5"/><circle cx="11" cy="14" r="1.5" fill="#8A5A5A"/><circle cx="17" cy="14" r="1.5" fill="#8A5A5A"/></svg>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
